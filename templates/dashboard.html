<script>

let chart = null;

// ============================
// 📡 Load Sensor Data
// ============================
async function loadDashboard(){

    try{

        const response = await fetch("/history");
        const data = await response.json();

        if(!data || data.length === 0){
            console.log("No sensor data yet");
            return;
        }

        const latest = data[0];

        // ----------------------
        // Update Live Cards
        // ----------------------
        const moisture = Number(latest.moisture);
        const temperature = Number(latest.temperature);
        const humidity = Number(latest.humidity);

        document.getElementById("moistureValue").innerText = moisture;
        document.getElementById("temperatureValue").innerText = temperature + " °C";
        document.getElementById("humidityValue").innerText = humidity + " %";

        document.getElementById("soil").innerText = latest.soil_condition;
        document.getElementById("crop").innerText = latest.recommended_crop;
        document.getElementById("fertilizer").innerText = latest.recommended_fertilizer;

        // ----------------------
        // Moisture Progress Bar
        // ----------------------
        const moisturePercent = Math.min(100, (moisture / 1023) * 100);
        document.getElementById("moistureBar").style.width = moisturePercent + "%";

        // ----------------------
        // Soil Alert
        // ----------------------
        let alertText = "";

        if(latest.soil_condition === "Dry"){
            alertText = "⚠ Soil is Dry — Irrigation Needed";
        }
        else if(latest.soil_condition === "Moderate"){
            alertText = "🌾 Soil Moisture is Optimal";
        }
        else{
            alertText = "💧 Soil is Wet";
        }

        document.getElementById("soilAlertText").innerText = alertText;

        // ----------------------
        // Farmer Action
        // ----------------------
        let action = "";

        if(latest.soil_condition === "Dry"){
            action = "🚿 Start irrigation to improve soil moisture.";
        }
        else if(latest.soil_condition === "Moderate"){
            action = "✅ Soil condition is healthy.";
        }
        else{
            action = "⚠ Soil too wet. Avoid irrigation.";
        }

        const farmerAction = document.getElementById("farmerAction");
        if(farmerAction){
            farmerAction.innerText = action;
        }

        // ----------------------
        // Chart Data
        // ----------------------
        updateChart(data);

    }
    catch(error){
        console.error("Dashboard Error:", error);
    }

}

// ============================
// 📊 Chart Setup
// ============================
function updateChart(data){

    const canvas = document.getElementById("sensorChart");

    if(!canvas) return;

    const ctx = canvas.getContext("2d");

    const labels = [];
    const moistureValues = [];

    data.slice().reverse().forEach(row=>{
        labels.push(row.timestamp);
        moistureValues.push(Number(row.moisture));
    });

    if(chart){
        chart.destroy();
    }

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Soil Moisture",
                data: moistureValues,
                borderWidth: 3,
                tension: 0.3
            }]
        },
        options:{
            responsive:true,
            scales:{
                y:{
                    beginAtZero:true
                }
            }
        }
    });

}

// ============================
// 📈 Yield Prediction
// ============================
async function predictYield(){

    const land = document.getElementById("landInput").value;
    const crop = document.getElementById("crop").innerText;

    if(!land){
        alert("Enter land size");
        return;
    }

    const response = await fetch("/predict_yield",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            land: land,
            crop: crop
        })
    });

    const result = await response.json();

    document.getElementById("yieldResult").innerText =
        "Estimated Yield: " + result.predicted_yield + " " + result.unit;

}

// ============================
// 🔊 Voice Recommendation
// ============================
async function speakRecommendation(){

    const crop = document.getElementById("crop").innerText;
    const fertilizer = document.getElementById("fertilizer").innerText;
    const soil = document.getElementById("soil").innerText;

    const response = await fetch("/speak",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            crop: crop,
            fertilizer: fertilizer,
            soil: soil,
            language: "en"
        })
    });

    const audioBlob = await response.blob();
    const audioUrl = URL.createObjectURL(audioBlob);

    const audio = new Audio(audioUrl);
    audio.play();

}

// ============================
// ⏱ Auto Refresh
// ============================
loadDashboard();
setInterval(loadDashboard,5000);

</script>
