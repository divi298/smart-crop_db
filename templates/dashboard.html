<!DOCTYPE html>
<html>

<head>

<title>Smart Crop IoT</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<!-- Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- ========================= -->
<!-- 🌱 TITLE -->
<!-- ========================= -->

<div class="section-title">
<h2>🌾 Smart Crop IoT Dashboard</h2>
</div>


<!-- ========================= -->
<!-- 📡 LIVE FIELD STATUS -->
<!-- ========================= -->

<div class="section-title">
<h2>📡 Live Field Status</h2>
</div>

<div class="cards">

<div class="card">

<i class="fas fa-water"></i>

<h3>Soil Moisture</h3>

<p id="moistureValue">--</p>

<div class="progress-container">
<div id="moistureBar" class="progress-bar"></div>
</div>

</div>


<div class="card">

<i class="fas fa-temperature-high"></i>

<h3>Temperature</h3>

<p id="temperatureValue">--</p>

</div>


<div class="card">

<i class="fas fa-cloud-rain"></i>

<h3>Humidity</h3>

<p id="humidityValue">--</p>

</div>

</div>



<!-- ========================= -->
<!-- 🌾 SOIL ALERT -->
<!-- ========================= -->

<div class="soil-alert">

<div class="soil-card">

<h2 id="soilAlertText">🌱 Checking Soil Condition...</h2>

</div>

</div>



<!-- ========================= -->
<!-- 🌾 CROP RECOMMENDATION -->
<!-- ========================= -->

<div class="section-title">
<h2><i class="fas fa-seedling"></i> Crop Recommendation</h2>
</div>

<div class="recommendation">

<div class="recommendation-card">

<p>
<strong>Soil Condition:</strong>
<span id="soil">--</span>
</p>

<p>
<strong>Recommended Crop:</strong>
<span id="crop" class="highlight-text">--</span>
</p>

<p>
<strong>Fertilizer:</strong>
<span id="fertilizer">--</span>
</p>

</div>

</div>



<!-- ========================= -->
<!-- 🚜 FARMER ACTION -->
<!-- ========================= -->

<div class="action-section">

<div id="farmerAction" class="action-card">

🌾 Waiting for soil analysis...

</div>

</div>



<!-- ========================= -->
<!-- 📊 MOISTURE CHART -->
<!-- ========================= -->

<div class="section-title">
<h2>📊 Moisture Trend</h2>
</div>

<div class="chart-section">

<canvas id="sensorChart"></canvas>

</div>



<!-- ========================= -->
<!-- JS SCRIPT -->
<!-- ========================= -->

<script src="{{ url_for('static', filename='dashboard.js') }}"></script>

</body>

</html>
