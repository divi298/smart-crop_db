<!DOCTYPE html>
<html>
<head>
    <title>Smart Crop IoT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="main-header">
    <h1>🌱 Smart Crop IoT Dashboard</h1>

    <select id="languageSwitcher" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="te">తెలుగు</option>
    </select>
</header>

<section class="section-title">
    <h2 data-key="live_status">📡 Live Field Status</h2>
</section>

<section class="cards">
    <div class="card">
        <h3 data-key="moisture">Moisture</h3>
        <p id="moistureValue">--</p>
    </div>

    <div class="card">
        <h3 data-key="temperature">Temperature</h3>
        <p id="temperatureValue">--</p>
    </div>

    <div class="card">
        <h3 data-key="humidity">Humidity</h3>
        <p id="humidityValue">--</p>
    </div>
</section>

<section class="section-title">
    <h2 data-key="crop_rec">🌾 Crop Recommendation</h2>
</section>

<section class="recommendation">
    <p><strong data-key="soil">Soil Condition:</strong>
        <span id="soil">--</span>
    </p>

    <p><strong data-key="crop">Recommended Crop:</strong>
        <span id="crop">--</span>
    </p>

    <p><strong data-key="fertilizer">Fertilizer:</strong>
        <span id="fertilizer">--</span>
    </p>

    <div style="margin-top:20px;">
        <button onclick="speakRecommendation()">🔊 Hear Recommendation</button>
    </div>
</section>

<section class="section-title">
    <h2 data-key="yield">📈 Yield Prediction</h2>
</section>

<section class="yield-section">
    <label data-key="land">Enter Land (in acres):</label>

    <div class="yield-input">
        <input type="number" id="landInput" placeholder="e.g. 2" min="0" step="0.1">
        <button onclick="predictYield()" data-key="predict">Predict</button>
    </div>

    <div class="yield-result">
        <h3 id="yieldResult"></h3>
    </div>
</section>

<section class="section-title">
    <h2>📊 Moisture Trend</h2>
</section>

<section class="chart-section">
    <canvas id="sensorChart"></canvas>
</section>
<script>
function speakRecommendation() {

    if (window.speechSynthesis.speaking) return;

    const crop = document.getElementById("crop").innerText.trim();
    const fertilizerRaw = document.getElementById("fertilizer").innerText.trim();
    const soil = document.getElementById("soil").innerText.trim();
    const selectedLang = document.getElementById("languageSwitcher").value;

    if (!crop || crop === "--") return;

    let fertilizer = fertilizerRaw
        .replace(/NPK/gi, "N P K")
        .replace(/-/g, " ");

    let message = "";

    if (selectedLang === "te") {
        message = `సిఫారసు చేసిన పంట ${crop}. నేల పరిస్థితి ${soil}. ఎన్ పి కె ${fertilizer} ఎరువు వాడండి.`;
    }
    else if (selectedLang === "hi") {
        message = `अनुशंसित फसल ${crop} है। मिट्टी की स्थिति ${soil} है। एन पी के ${fertilizer} उर्वरक का उपयोग करें।`;
    }
    else {
        message = `Recommended crop is ${crop}. Soil condition is ${soil}. Use fertilizer ${fertilizer}.`;
    }

    console.log("Speaking message:", message);

    const speech = new SpeechSynthesisUtterance(message);

    // 🔥 Wait for voices to load properly
    let voices = speechSynthesis.getVoices();

    // Some browsers load voices asynchronously
    if (voices.length === 0) {
        speechSynthesis.onvoiceschanged = () => {
            setVoiceAndSpeak();
        };
        return;
    }

    setVoiceAndSpeak();

    function setVoiceAndSpeak() {
        voices = speechSynthesis.getVoices();

        let selectedVoice = null;

        if (selectedLang === "te") {
            selectedVoice = voices.find(v => v.lang.toLowerCase().includes("te"));
        }
        else if (selectedLang === "hi") {
            selectedVoice = voices.find(v => v.lang.toLowerCase().includes("hi"));
        }
        else {
            selectedVoice = voices.find(v => v.lang.toLowerCase().includes("en"));
        }

        if (selectedVoice) {
            speech.voice = selectedVoice;
            console.log("Using voice:", selectedVoice.name);
        } else {
            console.warn("No matching voice found. Using default voice.");
        }

        speech.rate = 0.9;

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(speech);
    }
}
</script>
<!-- LOAD SCRIPTS ONLY ONCE -->
<script src="{{ url_for('static', filename='translations.js') }}"></script>
<script src="{{ url_for('static', filename='dashboard.js') }}"></script>

</body>
</html>
